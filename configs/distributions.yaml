# ---------------------------------------------------------------------------
# CUSTOMERS
# ---------------------------------------------------------------------------
customers:
  channel_descs:
    - Nike Direct
    - Wholesale
    - Digital
    - Retail Partner
    - Department Store
    - Sporting Goods
    - Pure Player Digital
  channel_weights: [25, 30, 20, 10, 5, 5, 5]

  marketplace_channels:
    - Nike.com
    - Nike App
    - SNKRS
    - Nike Stores
    - Nike Factory Store
    - Nike Community Store
    - Wholesale Digital
    - Traditional Wholesale

  business_types:
    - Direct to Consumer
    - Wholesale
    - Digital Native

# ---------------------------------------------------------------------------
# GL ACCOUNTS
# ---------------------------------------------------------------------------
gl_accounts:
  # Account number ranges by category
  ranges:
    revenue:       { start: 1000000, end: 1999999, sign: credit }
    cogs:          { start: 2000000, end: 2999999, sign: debit  }
    gross_profit:  { start: 3000000, end: 3099999, sign: credit }
    selling:       { start: 4000000, end: 4499999, sign: debit  }
    admin:         { start: 4500000, end: 4999999, sign: debit  }
    rd:            { start: 5000000, end: 5499999, sign: debit  }
    other_income:  { start: 6000000, end: 6499999, sign: credit }
    other_expense: { start: 6500000, end: 6999999, sign: debit  }
    tax:           { start: 7000000, end: 7499999, sign: debit  }
  category_weights: [20, 25, 5, 15, 10, 10, 5, 5, 5]

  chart_of_accounts: [US01, EU01, JP01, CN01, CONSO]

# ---------------------------------------------------------------------------
# VERSIONS / FORECASTS
# ---------------------------------------------------------------------------
versions:
  codes:
    - "010"   # Actual
    - "100"   # Budget
    - "110"   # Revised Budget
    - "120"   # Latest Estimate
    - "130"   # Rolling Forecast
    - "200"   # Long Range Plan
    - "300"   # Strategic Plan
  groups:
    Actual: ["010"]
    Budget: ["100", "110"]
    Forecast: ["120", "130"]
    Plan: ["200", "300"]

