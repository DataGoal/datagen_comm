# =============================================================================
# DISTRIBUTIONS CONFIGURATION
# =============================================================================
# Defines realistic domain values and probability weights for each field.
# The generator uses these pools to produce logically consistent data.
# =============================================================================

global:
  seed: 42                       # Reproducible generation
  null_probability_default: 0.0  # 0 % null unless overridden per field

# ---------------------------------------------------------------------------
# CURRENCIES & EXCHANGE
# ---------------------------------------------------------------------------
currencies:
  codes: [USD, EUR, GBP, JPY, CNY, KRW, CAD, AUD, CHF, BRL, MXN, INR, SGD, HKD, SEK]
  weights: [35, 20, 10, 8, 7, 4, 3, 3, 2, 2, 2, 1, 1, 1, 1]
  base_currency: USD            # Company / group currency

exchange_rates:
  # Approximate mid-market rates vs USD
  EUR: 0.92
  GBP: 0.79
  JPY: 149.5
  CNY: 7.24
  KRW: 1340.0
  CAD: 1.36
  AUD: 1.53
  CHF: 0.89
  BRL: 4.98
  MXN: 17.2
  INR: 83.1
  SGD: 1.34
  HKD: 7.82
  SEK: 10.4

# ---------------------------------------------------------------------------
# FINANCIAL DIMENSIONS
# ---------------------------------------------------------------------------
fiscal:
  # Fiscal year starts in June (period 1 = June)
  fiscal_year_start_month: 6
  periods_per_year: 13            # Nike uses 13-period fiscal calendar
  # Relative weights by fiscal period (period 13 = year-end is heavier)
  period_weights: [7,7,8,8,8,8,8,8,8,8,8,9,5]

amounts:
  # transaction_currency_amt range by GL account category
  revenue:
    min: 10_000
    max: 50_000_000
    distribution: log_normal
    mean: 500_000
    std_dev: 1_000_000
  cogs:
    min: 5_000
    max: 25_000_000
    distribution: log_normal
    mean: 250_000
    std_dev: 500_000
  opex:
    min: 1_000
    max: 5_000_000
    distribution: log_normal
    mean: 100_000
    std_dev: 200_000
  # Negative amounts (returns, adjustments) probability
  negative_probability: 0.12

quantities:
  sales_qty_min: 1
  sales_qty_max: 100_000
  returns_qty_ratio: 0.08       # returns ~ 8% of sales qty

# ---------------------------------------------------------------------------
# COMPANIES & GEOGRAPHIES
# ---------------------------------------------------------------------------
companies:
