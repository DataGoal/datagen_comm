    - Nike USA Inc
    - Nike Europe BV
    - Nike Japan KK
    - Nike Greater China Ltd
    - Nike Canada Corp
    - Nike Australia Pty Ltd
    - Nike UK Ltd
    - Nike Korea Ltd
    - Nike Brazil Ltda
    - Nike Mexico SA de CV
    - Converse Inc
    - Nike Direct
    - Nike Digital
    - Jordan Brand
    - Nike Golf
  currencies:
    - USD
    - EUR
    - JPY
    - CNY
    - CAD
    - AUD
    - GBP
    - KRW
    - BRL
    - MXN
    - USD
    - USD
    - USD
    - USD
    - USD

geographies:
  regions: [North America, EMEA, Greater China, APLA]
  region_weights: [35, 30, 20, 15]
  territories:
    North America: [USA, Canada, Mexico]
    EMEA: [UK, Germany, France, Netherlands, Italy, Spain, Nordics, Middle East, Africa]
    Greater China: [China Mainland, Hong Kong, Taiwan]
    APLA: [Japan, Korea, Southeast Asia, Australia, New Zealand, India, Brazil, Argentina]
  countries:
    - US
    - GB
    - DE
    - FR
    - NL
    - JP
    - CN
    - HK
    - KR
    - CA
    - AU
    - BR
    - MX
    - IN
    - SG

